{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>Register Student</h1>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 32px;">
    <!-- Form Side -->
    <div class="card">
        <h2 class="card-title">Student Details</h2>
        <form id="registerForm" method="POST" action="{{ url_for('register_student') }}">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required placeholder="e.g. John Doe">
            </div>
            <div class="form-group">
                <label class="form-label">Roll Number</label>
                <input type="text" name="roll" class="form-control" required placeholder="e.g. CS101">
            </div>
            <div class="form-group">
                <label class="form-label">Department</label>
                <input type="text" name="department" class="form-control" required placeholder="e.g. Computer Science">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Start Capture</button>
        </form>
    </div>

    <!-- Video Feed Side -->
    <div class="card">
        <h2 class="card-title">Live Face Capture</h2>
        <div class="video-container" id="videoFeedContainer" style="display: none;">
            <!-- The img src will be set dynamically via JS after form submit if needed, 
                 or we just render it if active_capture is True -->
            {% if active_capture %}
                <img src="{{ url_for('video_feed_register') }}" alt="Capturing Faces...">
            {% else %}
                <div style="color: white; text-align: center; padding: 40px;">
                    <i class="fas fa-video fa-3x" style="margin-bottom: 16px; opacity: 0.5;"></i>
                    <p>Enter details and click 'Start Capture' to begin recording 60 images.</p>
                </div>
            {% endif %}
        </div>
        {% if active_capture %}
        <script>
            document.getElementById('videoFeedContainer').style.display = 'flex';
        </script>
        {% else %}
        <script>
            document.getElementById('videoFeedContainer').style.display = 'flex';
        </script>
        {% endif %}
    </div>
</div>
{% endblock %}
